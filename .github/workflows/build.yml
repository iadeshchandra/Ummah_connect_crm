name: Ummah Connect CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.7
        cache-disabled: true
        
    - name: Clean Windows Hidden Files
      run: |
        find . -name "desktop.ini" -type f -delete
        find . -name "Thumbs.db" -type f -delete
        find . -name ".DS_Store" -type f -delete
        
    - name: Decode google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: |
        echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/google-services.json
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon
      
    - name: Rename APK
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Ummah-Connect-v1.0.apk
        
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ummah-Connect-v1.0
        path: app/build/outputs/apk/debug/Ummah-Connect-v1.0.apk
        retention-days: 30
