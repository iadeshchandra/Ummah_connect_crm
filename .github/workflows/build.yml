name: Ummah Connect CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # STRICT GRADLE 8.7 SETUP WITH CACHE BYPASS
    - name: Setup Gradle 8.7
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'
        cache-disabled: true

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Automatically delete any hidden Windows files that cause Android to crash
    - name: Clean up Windows Hidden Files
      run: |
        find . -name "desktop.ini" -type f -delete
        find . -name "Thumbs.db" -type f -delete
        find . -name ".DS_Store" -type f -delete

    # 🔐 THE MAGIC STEP: Recreate the JSON file from your secure GitHub Vault!
    - name: Decode and create google-services.json
      env:
        GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
      run: echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

    - name: Build Installable APK
      run: ./gradlew assembleDebug

    - name: Rename APK for Professional Distribution
      run: mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/Ummah-Connect-v1.0.apk

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Ummah-Connect-v1.0
        path: app/build/outputs/apk/debug/Ummah-Connect-v1.0.apk
        retention-days: 30
